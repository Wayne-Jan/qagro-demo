<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Deploy-time q_agro · evidence map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@300;400;500;600;700&family=Roboto+Mono:wght@500;600;700&display=swap');
:root{--serif:'Noto Serif TC',Georgia,serif;--sans:'Noto Sans TC',-apple-system,'Segoe UI',sans-serif;
--num:'Roboto Mono','SFMono-Regular',Consolas,monospace;
--paper:#f5f2ea;--paper2:#fbfaf6;--ink:#1a2230;--slate:#3d4757;--mut:#7a8290;--indigo:#4538c9;
--line:#e2ddd0;--pos:#0072B2;--neg:#D55E00;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);color:var(--slate);line-height:1.6;background:var(--paper);
background-image:radial-gradient(circle at 1px 1px,rgba(26,34,48,.035) 1px,transparent 0);background-size:22px 22px;-webkit-font-smoothing:antialiased;}
.wrap{max-width:1400px;margin:0 auto;padding:24px 40px 70px;}
.bh-sub2{font-size:10.5px;color:var(--mut);margin:0 0 11px;}
.outcome-lead{margin:16px 0 2px;}
.correction{margin:0;}
.c-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:11px;}
.ctag{font-size:12px;letter-spacing:.7px;color:var(--mut);font-weight:700;}
.cprog{display:grid;grid-template-columns:minmax(58px,.95fr) 42px minmax(72px,1.08fr) 42px minmax(62px,.98fr) 42px minmax(82px,1.25fr);align-items:center;gap:6px;text-align:center;width:100%;overflow:hidden;}
.cstep{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0;}
.cn{font-family:var(--serif);font-weight:900;font-size:28px;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:-.6px;line-height:1;white-space:nowrap;}
.cn.fin.good{color:#0c7a4b;} .cn.fin.warn{color:#b3530a;}
.cl{font-size:10px;text-transform:uppercase;letter-spacing:.45px;color:var(--mut);font-weight:700;white-space:nowrap;}
.cstep.cal .cn,.cstep.cal .cl{color:#4538c9;}
.cstep.qag.good .cn,.cstep.qag.good .cl{color:#0c7a4b;}
.cstep.qag.warn .cn,.cstep.qag.warn .cl{color:#b3530a;}
.cstep.gt .cn,.cstep.gt .cl{color:#0072CE;}
.cbadge{align-self:center;display:inline-flex;align-items:center;gap:5px;font-family:var(--sans);font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;padding:5px 10px 5px 8px;border-radius:999px;border:1px solid;line-height:1;white-space:nowrap;cursor:help;box-shadow:0 1px 2px rgba(40,30,10,.05);}
.cbadge.good{color:#0c7a4b;background:#eaf4ee;border-color:#c2e0cf;}
.cbadge.warn{color:#b3530a;background:#fbeede;border-color:#f0d3ad;}
.cbi{width:13px;height:13px;flex:none;}
.ca{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-family:var(--serif);font-size:17px;color:#cabfa6;font-weight:400;margin-top:-5px;position:relative;cursor:help;line-height:1;min-width:0;}
.ca-d{font-family:var(--num);font-size:9.5px;font-weight:800;letter-spacing:.1px;font-variant-numeric:tabular-nums;line-height:1;color:var(--slate);white-space:nowrap;padding:2px 4px;border-radius:999px;background:#f2eee6;border:1px solid #e5decf;}
.ca-d.pos{color:var(--pos);} .ca-d.neg{color:var(--neg);}
.ca.gt-compare{color:#D55E00;}
.ca.gt-compare .ca-d{color:#D55E00;background:#fff5ef;border-color:#f0c8b6;}
.ca[data-tip]:hover{color:var(--indigo);}
.ca[data-tip]:hover::after{content:attr(data-tip);position:absolute;left:50%;bottom:150%;transform:translateX(-50%);background:var(--ink);color:#fff;font-family:var(--sans);font-size:10.5px;font-weight:500;white-space:nowrap;padding:5px 9px;border-radius:6px;letter-spacing:.2px;z-index:30;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.2);}
.modblock{padding:0;border-top:1px solid var(--line);margin:0;}
.mh{font-size:11.5px;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;color:var(--indigo);margin-bottom:12px;}
.mh-sub{display:block;font-size:9.5px;font-weight:500;letter-spacing:.2px;text-transform:none;color:var(--mut);margin-top:4px;}
.mod-row{display:grid;grid-template-columns:88px 1fr 88px;align-items:center;gap:9px;margin-bottom:9px;}
.mod-name{font-size:12.5px;font-weight:700;color:var(--slate);}
.mod-track{position:relative;height:16px;background:#f0ece4;border-radius:6px;overflow:hidden;}
.mod-axis{position:absolute;left:50%;top:0;bottom:0;width:1px;background:#d6cebd;}
.mod-fill{position:absolute;top:3px;bottom:3px;border-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,.06);}
.mod-val{font-family:var(--num);font-size:13px;font-weight:800;text-align:right;font-variant-numeric:tabular-nums;}
.acc{border-top:1px solid var(--line);}
.acc-h{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;background:none;border:none;cursor:pointer;font-family:var(--sans);font-size:13.5px;font-weight:600;color:var(--ink);padding:15px 2px;text-align:left;transition:color .2s;}
.acc-h:hover{color:var(--indigo);}
.acc.open .acc-h .chev{transform:rotate(225deg);}
.acc-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .4s cubic-bezier(.4,.8,.3,1);}
.acc.open .acc-body{grid-template-rows:1fr;}
.acc-in{overflow:hidden;}
.acc.open .acc-in{padding-bottom:18px;}
.ptabs{display:flex;gap:18px;border-bottom:1px solid var(--line);margin-top:9px;flex:none;}
.ptab{background:none;border:none;cursor:pointer;font-family:var(--sans);font-size:13.5px;font-weight:700;color:var(--mut);padding:11px 1px;position:relative;transition:color .2s;}
.ptab:hover{color:var(--ink);}
.ptab.active{color:var(--indigo);}
.ptab.active::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--indigo);border-radius:2px 2px 0 0;}
.ppanes{padding-top:16px;flex:1;min-height:0;display:flex;}
.ppane{display:none;}
.ppane.active{display:block;width:100%;animation:paneIn .3s ease;}
.ppane[data-pane="main"].active{display:grid;grid-template-rows:minmax(108px,.88fr) minmax(178px,1.3fr) minmax(112px,.92fr);gap:18px;height:100%;}
.ppane[data-pane="main"].active .correction{align-self:center;}
.ppane[data-pane="main"].active .modblock{display:flex;flex-direction:column;justify-content:center;}
.ppane[data-pane="main"].active .sigstrip{align-self:end;width:100%;}
@keyframes paneIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
@media (prefers-reduced-motion:reduce){.ppane.active{animation:none;}}
.fp-num{font-size:10px;font-weight:700;color:rgba(255,255,255,.85);text-shadow:0 1px 3px rgba(0,0,0,.75);text-align:center;white-space:nowrap;letter-spacing:.2px;}
body.street .fp-num{color:rgba(26,34,48,.72);text-shadow:0 1px 2px rgba(255,255,255,.85);}
.selector{position:relative;z-index:40;margin:24px 0 18px;display:flex;flex-direction:column;gap:14px;align-items:stretch;}
.filters{display:flex;gap:22px;flex-wrap:wrap;}
.fgroup{display:flex;align-items:center;gap:7px;}
.fl{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--mut);font-weight:600;margin-right:3px;}
.chipf{font-size:12px;font-weight:600;color:var(--slate);background:var(--paper2);border:1px solid var(--line);
border-radius:999px;padding:5px 13px;cursor:pointer;transition:.18s;}
.chipf:hover{border-color:#cfc8b6;} .chipf.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.picker{display:flex;align-items:center;gap:8px;}
.nav{width:34px;height:34px;border:1px solid var(--line);background:var(--paper2);border-radius:9px;cursor:pointer;
font-size:17px;color:var(--ink);line-height:1;transition:.18s;}
.nav:hover{border-color:var(--ink);} .nav:disabled{opacity:.35;cursor:default;}
.cbox{position:relative;}
.cbox-btn{display:flex;align-items:center;gap:11px;min-width:520px;font-family:var(--sans);background:linear-gradient(180deg,#fffdf8,#f7f3ea);
border:1px solid #ddd5c7;border-radius:11px;padding:8px 13px 8px 9px;cursor:pointer;transition:.18s;text-align:left;box-shadow:0 6px 18px -15px rgba(26,34,48,.55),inset 0 1px 0 rgba(255,255,255,.8);}
.cbox-btn:hover{border-color:#c9c0ae;box-shadow:0 10px 24px -17px rgba(26,34,48,.58),inset 0 1px 0 rgba(255,255,255,.86);}
.cbox.open .cbox-btn{border-color:var(--ink);box-shadow:0 13px 28px -18px rgba(26,34,48,.6),inset 0 1px 0 rgba(255,255,255,.86);}
.cbox-cur{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.cbox-num{flex:none;font-family:var(--num);font-weight:800;font-size:12px;color:#1a2230;background:#ece9e1;
border-radius:7px;padding:4px 8px;letter-spacing:.2px;font-variant-numeric:tabular-nums;}
.cbox-main{flex:1;min-width:0;}
.cbox-t{font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.1px;line-height:1.25;}
.casepick{display:grid;grid-template-columns:auto minmax(0,1fr) auto;align-items:center;gap:10px;width:100%;min-width:0;}
.case-main{min-width:0;}
.case-line{display:flex;align-items:center;gap:7px;min-width:0;}
.case-title{font-size:13px;font-weight:800;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.1px;line-height:1.25;}
.case-sub{margin-top:3px;display:flex;align-items:center;gap:6px;min-width:0;font-size:10.5px;font-weight:700;color:var(--mut);letter-spacing:.15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.case-pill{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:2px 7px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.45px;line-height:1;border:1px solid transparent;white-space:nowrap;}
.case-pill.good{color:#0c7a4b;background:#eaf4ee;border-color:#c2e0cf;}
.case-pill.warn{color:#b3530a;background:#fbeede;border-color:#f0d3ad;}
.case-pill.blue{color:#175e99;background:#eaf4fb;border-color:#bddcf1;}
.case-pill.neutral{color:var(--slate);background:#efece4;border-color:#ded8ca;}
.case-meta{display:flex;align-items:center;gap:5px;justify-content:flex-end;flex-wrap:wrap;max-width:170px;}
.case-dot{color:#c0b7a4;font-weight:600;}
.casepick .flag{width:18px;height:12.6px;border-radius:2px;}
.casepick .fieldico{width:18px;height:18px;border-radius:5px;box-shadow:0 0 0 1px rgba(26,34,48,.1);}
.fieldtext{margin-left:5px;}
.case-crop{font-size:14px;line-height:1;display:inline-flex;align-items:center;}
.case-crop .csvg{width:15px;height:15px;}
.cbox-st{flex:none;display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 8px;border-radius:999px;}

.st-consensus{color:#0c7a4b;background:#eaf4ee;} .st-consensus .d{background:#0c7a4b;}
.st-conflict{color:#b3530a;background:#fbeede;} .st-conflict .d{background:#b3530a;}
.st-mixed{color:var(--slate);background:#efece4;} .st-mixed .d{background:var(--mut);}
.cbox-chev{flex:none;width:7px;height:7px;border-right:2px solid var(--mut);border-bottom:2px solid var(--mut);transform:rotate(45deg);transition:transform .25s;margin:-3px 1px 0;}
.cbox.open .cbox-chev{transform:rotate(-135deg);margin-top:2px;}
.cbox-menu{position:absolute;left:0;right:0;top:calc(100% + 7px);z-index:80;background:var(--paper2);border:1px solid var(--line);
border-radius:13px;box-shadow:0 26px 54px -22px rgba(26,34,48,.55);padding:6px;max-height:0;overflow:hidden;opacity:0;
transform:translateY(-6px);pointer-events:none;transition:opacity .2s ease,transform .22s cubic-bezier(.4,.8,.3,1),max-height .24s ease;}
.cbox.open .cbox-menu{max-height:388px;overflow-y:auto;opacity:1;transform:translateY(0);pointer-events:auto;}
.cbox-opt{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;cursor:pointer;transition:background .14s;}
.cbox-opt+.cbox-opt{margin-top:1px;}
.cbox-opt:hover{background:#efece4;}
.cbox-opt.sel{background:#ece9e1;}
.cbox-opt .cbox-num{font-size:11.5px;}
.cbox-opt .case-title{font-size:12.5px;}
.cbox-opt .case-meta{max-width:150px;}
.cbox-menu::-webkit-scrollbar{width:8px;} .cbox-menu::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px;}
.count{display:none;}
.combo-stats{font-size:11.5px;color:var(--mut);font-weight:700;letter-spacing:.15px;margin:-6px 0 0 42px;}
.combo-stats b{color:var(--ink);font-weight:800;}
.combo-stats .good{color:#0c7a4b;}
.combo-stats .warn{color:#b3530a;}
.stage{display:grid;grid-template-columns:1.62fr 1fr;gap:32px;align-items:start;}
@media(max-width:980px){.stage{grid-template-columns:1fr;}.wrap{padding:46px 16px 70px;}.cbox{flex:1;}.cbox-btn{min-width:0;width:100%;}.side{height:auto;}}
.mapwrap{position:relative;border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:0 24px 60px -30px rgba(26,34,48,.45);background:#1c2530;}
#map{height:620px;width:100%;background:#1c2530;z-index:1;}
.leaflet-container{font-family:var(--sans);background:#1c2530;}
.flowline{stroke-dasharray:3 7;}
.flowline.xr{stroke-dasharray:3 9;}
.maplegend{position:absolute;left:14px;bottom:14px;z-index:500;background:rgba(251,250,246,.95);border:1px solid var(--line);

.bmtoggle{position:absolute;left:14px;bottom:14px;z-index:500;display:flex;background:rgba(251,250,246,.95);
border:1px solid var(--line);border-radius:9px;padding:3px;gap:2px;backdrop-filter:blur(4px);box-shadow:0 4px 12px -4px rgba(0,0,0,.3);}
.bmtoggle button{border:none;background:none;font-family:var(--sans);font-size:11px;font-weight:600;color:var(--mut);
padding:5px 12px;border-radius:7px;cursor:pointer;text-transform:capitalize;transition:.15s;}
.bmtoggle button.on{background:var(--ink);color:#fff;}
.qmark{width:20px;height:20px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5));}
.field-poly{filter:drop-shadow(0 0 6px rgba(255,255,255,.35));}
.query-mask{stroke:#ff2d87;stroke-width:2.6;stroke-opacity:1;fill:#ff2d87;fill-opacity:.22;stroke-linejoin:round;filter:drop-shadow(0 0 2px rgba(8,12,20,.92)) drop-shadow(0 0 6px rgba(255,45,135,.85));}

.nlabel{font-size:11px;font-weight:700;color:#fff;background:rgba(26,34,48,.78);padding:2px 7px;border-radius:6px;
white-space:nowrap;border:1px solid rgba(255,255,255,.18);}
.leaflet-tooltip.nlabel:before{display:none;}
.lpop{font-family:var(--sans);font-size:12.5px;} .lpop b{font-family:var(--serif);}
.lpop .ld{display:grid;grid-template-columns:1fr auto;gap:4px 14px;margin-top:8px;border-top:1px solid rgba(0,0,0,.1);padding-top:7px;}
.lpop .lk{color:var(--mut);font-size:11px;}
.lpop .lv{font-variant-numeric:tabular-nums;font-weight:700;}
.lpop .good{color:#0c7a4b;} .lpop .warn{color:#b3530a;}
.side{height:620px;display:flex;flex-direction:column;}
.side-head{padding-bottom:16px;border-bottom:1px solid var(--line);flex:none;}

.fieldico{flex:none;display:inline-flex;width:24px;height:24px;border-radius:7px;overflow:hidden;background:#eef6ed;box-shadow:0 0 0 1px rgba(26,34,48,.12),0 2px 5px rgba(26,34,48,.1);}

.sig-z{background:var(--paper2);padding:11px 13px 12px;}
.sig-h{display:flex;align-items:center;gap:7px;font-size:10.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--indigo);margin-bottom:9px;}
.unit-lower{text-transform:none;letter-spacing:.2px;}

.block{padding:6px 0 16px;}

        '<div class="nc-stat"><span class="nc-k">prediction effect</span><span class="nc-v" style="color:'+color+'">'+esc(nb.dir)+' / '+esc(nb.mag)+'</span></div></div>'+
      '<div class="nc-views">'+vrows+'</div></div>';
  }).join("");
  box.innerHTML='<div class="ncards">'+html+'</div>';
  box.querySelectorAll('.ncard[data-nn]').forEach(function(el){
    el.addEventListener("mouseover",function(){hot(el.dataset.nn,true);});
    el.addEventListener("mouseout",function(){hot(el.dataset.nn,false);});
    el.addEventListener("click",function(){focusNeighbour(el.dataset.nn);});});}
function sigstrip(c){var s=c.signal||{},o=c.outcome;
  var calP=s.calDir==="positive"?"raises yield":(s.calDir==="negative"?"lowers yield":"—");
  var relP=s.rel==="opposite_direction"?"opposite":(s.rel==="same_direction"?"same":"—");
  var calStyle=s.calDir==="positive"||s.calDir==="negative"?' style="color:'+dc(s.calDir)+'"':"";
  var relT=s.rel==="opposite_direction"?"warn":(s.rel==="same_direction"?"good":"neutral");
  var viewT=s.viewEvidence==="consensus"?"good":"neutral";
  var dlp=function(v){if(v==null)return '<span class="sig-v">n/a</span>';var d=v<0?"negative":"positive";return '<span class="sig-v" style="color:'+dc(d)+'">'+(v<0?"−":"+")+Math.abs(v).toFixed(2)+'</span>';};
  var calDelta=o&&o.calPredictionDelta!=null?o.calPredictionDelta:null;
  var qagDelta=o&&o.qagPredictionDelta!=null?o.qagPredictionDelta:null;
  var post=o?('<div class="sig-row"><span class="sig-k">Δ Calibration</span>'+dlp(calDelta)+'</div>'+
              '<div class="sig-row"><span class="sig-k">Δ q_agro</span>'+dlp(qagDelta)+'</div>'):
             '<div class="sig-row"><span class="sig-k">outcome</span><span class="sig-v">withheld</span></div>';
  document.getElementById("sigstrip").innerHTML=
    '<div class="sig">'+
      '<div class="sig-z"><div class="sig-h"><span class="sig-i">◇</span>Pre-deploy signal</div>'+
        '<div class="sig-row"><span class="sig-k">Calibration Δ</span><span class="sig-v"'+calStyle+' title="options: raises yield / lowers yield">'+calP+'</span></div>'+
        '<div class="sig-row"><span class="sig-k">q_agro vs cal.</span><span class="sig-v '+relT+'" title="options: same / opposite">'+relP+'</span></div>'+
        '<div class="sig-row"><span class="sig-k">View agreement</span><span class="sig-v '+viewT+'" title="options: consensus / conflict">'+esc(s.viewEvidence||"—")+'</span></div>'+
      '</div>'+
      '<div class="sig-z"><div class="sig-h"><span class="sig-i">◷</span>Post-hoc prediction Δ <span class="unit-lower">(t/ha)</span></div>'+post+'</div>'+
    '</div>';}
function caseTitle(c){return c.crop+" · "+c.shortField;}
function stanceTag(s){return '<span class="cbox-st st-'+s+'"><span class="d"></span>'+s+'</span>';}
function pill(txt,tone){return '<span class="case-pill '+tone+'">'+esc(txt)+'</span>';}
function caseField(c){var p=String(c.shortField||"").split(" · ");return p[p.length-1]||c.field;}
function srText(c){return "SR "+Number(c.sr).toFixed(2).replace(/0+$/,"").replace(/\.$/,"");}
function evidenceText(c){return (c.evidenceStatus==="topk_exported"||c.neighbors.length)?"Top-"+(c.k||3):"needs top-k";}
function calWins(c){var o=c.outcome,cal=o?Number(o.calResidual):Number(c.idx&&c.idx.calibrationResidual),qag=o?Number(o.qagResidual):Number(c.idx&&c.idx.qagroResidual);return Number.isFinite(cal)&&Number.isFinite(qag)&&Math.abs(cal)<Math.abs(qag);}
function caseInner(c){var helped=(c.outcome?c.outcome.helped:c.helped),effect=helped?"helped":"harmed",cw=calWins(c);
  return '<span class="casepick"><span class="cbox-num">'+c.num+'</span><span class="case-main">'+
    '<span class="case-line"><span class="case-title">'+flagChip(c.country)+' '+esc(c.country)+' <span class="case-dot">·</span> <span class="case-crop">'+cropIcon(c.crop)+'</span> '+esc(c.crop)+' <span class="case-dot">·</span> '+fieldIcon()+'<span class="fieldtext">'+esc(caseField(c))+'</span></span></span>'+
    '<span class="case-sub">'+esc(srText(c))+'<span class="case-dot">·</span>'+esc(c.protocol)+'<span class="case-dot">·</span>'+esc(evidenceText(c))+'<span class="case-dot">·</span>'+esc(c.stance)+'</span>'+
    '</span><span class="case-meta">'+pill(effect,helped?"good":"warn")+(cw?pill("Cal wins","blue"):"")+'</span></span>';}
function setCur(i){document.getElementById("cboxCur").innerHTML=caseInner(CASES[i]);}
function markSel(i){document.querySelectorAll("#cboxMenu .cbox-opt").forEach(function(o){o.classList.toggle("sel",parseInt(o.dataset.i,10)===i);});}
function closeBox(){var b=document.getElementById("cbox");b.classList.remove("open");document.getElementById("cboxBtn").setAttribute("aria-expanded","false");}
function openBox(){var b=document.getElementById("cbox");b.classList.add("open");document.getElementById("cboxBtn").setAttribute("aria-expanded","true");var s=document.querySelector("#cboxMenu .cbox-opt.sel");if(s)s.scrollIntoView({block:"nearest"});}
var FLAG={
  Germany:'<svg viewBox="0 0 20 14"><rect width="20" height="4.667" fill="#000"/><rect width="20" height="4.667" y="4.667" fill="#D00"/><rect width="20" height="4.666" y="9.333" fill="#FFCE00"/></svg>',
  Argentina:'<svg viewBox="0 0 20 14"><rect width="20" height="14" fill="#fff"/><rect width="20" height="4.667" fill="#74ACDF"/><rect width="20" height="4.667" y="9.333" fill="#74ACDF"/><circle cx="10" cy="7" r="1.5" fill="#F6B40E"/></svg>',
  Brazil:'<svg viewBox="0 0 20 14"><rect width="20" height="14" fill="#009C3B"/><polygon points="10,1.6 18.4,7 10,12.4 1.6,7" fill="#FFDF00"/><circle cx="10" cy="7" r="2.7" fill="#002776"/></svg>'};
var CROPEMO={Wheat:"🌾",Corn:"🌽"};
var SOYSVG='<svg class="csvg" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 22V11.5" fill="none" stroke="#5a8f3c" stroke-width="2.1" stroke-linecap="round"/><ellipse cx="8.1" cy="9.2" rx="4.4" ry="2.5" transform="rotate(-34 8.1 9.2)" fill="#84bb5c"/><ellipse cx="15.9" cy="9.2" rx="4.4" ry="2.5" transform="rotate(34 15.9 9.2)" fill="#6ea848"/></svg>';
function cropIcon(crop){return crop==="Soybean"?SOYSVG:(CROPEMO[crop]||"");}
function flagChip(country){return FLAG[country]?'<span class="flag">'+FLAG[country]+'</span>':'';}
function fieldIcon(){return '<span class="fieldico"><svg viewBox="0 0 32 32" aria-hidden="true"><rect width="32" height="32" fill="#5f9a45"/><g fill="#86c067"><rect y="2.5" width="32" height="3.2"/><rect y="8.5" width="32" height="3.2"/><rect y="14.5" width="32" height="3.2"/><rect y="20.5" width="32" height="3.2"/></g><rect y="26.5" width="32" height="5.5" fill="#cdb06a"/><rect x="27" y="26.5" width="5" height="5.5" fill="#bd9c55"/><path d="M5.5 0V26.5" stroke="#4a7d34" stroke-width="1.1" opacity=".55"/></svg></span>';}
function fieldTitle(c){var p=c.shortField.split(" · ");var fn=p[p.length-1];
  return flagChip(c.country)+'<span class="hc">'+esc(c.country)+'</span><span class="hdot">·</span>'+
    '<span class="hcrop">'+cropIcon(c.crop)+'</span><span class="hc">'+esc(c.crop)+'</span><span class="hdot">·</span>'+
    fieldIcon()+'<span class="hf fieldtext">'+esc(fn)+'</span>';}
function render(i){active=i;var c=CASES[i];
  if(!c)return;
  if(!c.__loaded){renderLoading(i,c);loadCase(i).then(function(){render(i);}).catch(function(err){console.error(err);});return;}
  setCur(i);markSel(i);
  document.getElementById("field").innerHTML=fieldTitle(c);
  document.getElementById("field").title=c.field;
  sigstrip(c);
  draw(c);decomp(c);nbt(c);
  document.getElementById("chips").innerHTML='<div class="chips">'+c.chips.map(function(ch){return '<div class="chip chip-'+ch.tone+'"><span class="ck">'+esc(ch.k)+'</span><span class="cv">'+esc(ch.v)+'</span></div>';}).join("")+'</div>';
  var o=c.outcome;
  var fr=function(v){return (v<=0?"−":"+")+Math.abs(v).toFixed(2);};
  var fy=function(v){return v.toFixed(2);};
  var fp=function(v){return (v<0?"−":"+")+Math.abs(v).toFixed(2);};
  var dtone=function(v){return v<0?"neg":"pos";};
  var dtip=function(v){return (v<=0?"−":"+")+Math.abs(v).toFixed(3)+" residual";};
  var predAlignedResidual=function(v){return fp(-v)+" t/ha";};
  var ico=o.helped?'<path fill="currentColor" d="M2 21h4V9H2v12zm20-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L13.17 1 6.59 7.59C6.22 7.95 6 8.45 6 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/>':'<path fill="currentColor" d="M22 3h-4v12h4V3zM2 14c0 1.1.9 2 2 2h6.31l-.95 4.57-.03.32c0 .41.17.79.44 1.06L10.83 23l6.58-6.59c.37-.36.59-.86.59-1.41V4c0-1.1-.9-2-2-2H7c-.83 0-1.54.5-1.84 1.22L2.14 10.27C2.05 10.5 2 10.74 2 11v3z"/>';
  var predReady=o&&o.basePrediction!=null&&o.calPrediction!=null&&o.qagPrediction!=null;
  var head=function(label){return '<div class="c-head"><div class="ctag">'+label+'</div><span class="cbadge '+(o.helped?"good":"warn")+'" title="'+(o.helped?"q_agro lowered absolute residual vs base":"q_agro raised absolute residual vs base")+'"><svg class="cbi" viewBox="0 0 24 24" aria-hidden="true">'+ico+'</svg>'+(o.helped?"helped":"harmed")+'</span></div>';};
  document.getElementById("correction").innerHTML=o?(predReady?(head('Predicted yield (t/ha)')+'<div class="cprog">'+
    '<div class="cstep base"><span class="cn">'+fy(o.basePrediction)+'</span><span class="cl">base</span></div><span class="ca" title="Δ Prediction '+fp(o.calPredictionDelta)+' t/ha · Δ residual, prediction sign '+predAlignedResidual(o.calResidualDelta)+'"><span class="ca-d '+dtone(o.calPredictionDelta)+'">'+fp(o.calPredictionDelta)+'</span>&rarr;</span>'+
    '<div class="cstep cal"><span class="cn">'+fy(o.calPrediction)+'</span><span class="cl">calibration</span></div><span class="ca" title="Δ Prediction '+fp(o.qagPredictionDelta)+' t/ha · Δ residual, prediction sign '+predAlignedResidual(o.qagResidualDelta)+'"><span class="ca-d '+dtone(o.qagPredictionDelta)+'">'+fp(o.qagPredictionDelta)+'</span>&rarr;</span>'+
    '<div class="cstep qag '+(o.helped?"good":"warn")+'"><span class="cn">'+fy(o.qagPrediction)+'</span><span class="cl">q_agro</span></div>'+
    '<span class="ca gt-compare" title="absolute difference between Ground Truth and q_agro prediction"><span class="ca-d">'+Math.abs(o.qagResidual).toFixed(2)+'</span>&harr;</span><div class="cstep gt"><span class="cn">'+fy(o.targetYield)+'</span><span class="cl">Ground Truth</span></div>'+
    '</div>'):(head('prediction residual (t/ha)')+'<div class="cprog">'+
    ((o.baseResidual!=null)?'<div class="cstep base"><span class="cn">'+fr(o.baseResidual)+'</span><span class="cl">base</span></div><span class="ca" title="Δ Calibration '+dtip(o.calResidualDelta)+'">&rarr;</span>':'')+
    '<div class="cstep cal"><span class="cn">'+fr(o.calResidual)+'</span><span class="cl">calibration</span></div><span class="ca" title="Δ q_agro '+dtip(o.qagResidualDelta)+'">&rarr;</span>'+
    '<div class="cstep qag '+(o.helped?"good":"warn")+'"><span class="cn">'+fr(o.qagResidual)+'</span><span class="cl">q_agro</span></div>'+
    '</div>')):"";
  var mb=document.getElementById("modbars");
  if(c.modality&&c.modality.length){mb.innerHTML=c.modality.map(function(m){
    var pos=m.dir==="positive";
    var score=Number.isFinite(Number(m.norm))?Number(m.norm):Number(m.w);
    score=Math.max(0,Math.min(100,score));
    var w=(score/2).toFixed(0);
    var fill='<div class="mod-fill" style="width:'+w+'%;'+(pos?"left:50%":"right:50%")+';background:'+dc(m.dir)+'"></div>';
    var sign=m.dir==="negative"?"−":(m.dir==="positive"?"+":"0");
    return '<div class="mod-row"><div class="mod-name">'+vTag(m.view)+'</div><div class="mod-track"><div class="mod-axis"></div>'+fill+'</div><div class="mod-val" style="color:'+dc(m.dir)+'">'+sign+Math.round(score)+'</div></div>';}).join("");
    document.getElementById("modblock").style.display="";}
  else{document.getElementById("modblock").style.display="none";}
  setTimeout(function(){map.invalidateSize();draw(c,true);var ov=map.getPane("overlayPane");
    if(ov){ov.style.transition="none";ov.style.opacity="0";ov.getBoundingClientRect();ov.style.transition="opacity .55s ease";ov.style.opacity="1";}},60);
}
function filtered(){return CASES.map(function(c,i){return i;}).filter(function(i){var c=CASES[i];
  return (filt.crop==="all"||c.crop===filt.crop)&&(filt.stance==="all"||c.stance===filt.stance)&&(filt.sr==="all"||Number(c.sr)===Number(filt.sr))&&(filt.country==="all"||c.country===filt.country);});}
function rebuild(){var idx=filtered();var menu=document.getElementById("cboxMenu");
  var shown=idx.slice(0,MENU_LIMIT);
  menu.innerHTML=shown.map(function(i){return '<div class="cbox-opt'+(i===active?" sel":"")+'" data-i="'+i+'" role="option">'+caseInner(CASES[i])+'</div>';}).join("");
  menu.querySelectorAll(".cbox-opt").forEach(function(o){o.addEventListener("click",function(){closeBox();render(parseInt(o.dataset.i,10));});});
  document.getElementById("count").textContent="";
  if(!idx.length){document.getElementById("cboxCur").textContent=INDEX_EXTENDING?"Loading matching cases...":"No cases for this filter";document.getElementById("prev").disabled=true;document.getElementById("next").disabled=true;return;}
  if(idx.indexOf(active)<0&&idx.length){render(idx[0]);}else if(idx.length){setCur(active);markSel(active);}
  document.getElementById("prev").disabled=idx.length<2;document.getElementById("next").disabled=idx.length<2;}
document.querySelectorAll(".chipf").forEach(function(ch){ch.addEventListener("click",function(){
  var f=ch.dataset.f;document.querySelectorAll('.chipf[data-f="'+f+'"]').forEach(function(x){x.classList.remove("on");});
  ch.classList.add("on");filt[f]=ch.dataset.v;rebuild();ensureFilterCoverage();});});
document.getElementById("cboxBtn").addEventListener("click",function(e){e.stopPropagation();document.getElementById("cbox").classList.contains("open")?closeBox():openBox();});
document.addEventListener("click",function(e){if(!document.getElementById("cbox").contains(e.target))closeBox();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeBox();});
function step(d){var idx=filtered();if(!idx.length)return;var p=idx.indexOf(active);if(p<0)p=0;render(idx[(p+d+idx.length)%idx.length]);}
document.getElementById("prev").addEventListener("click",function(){step(-1);});
document.getElementById("next").addEventListener("click",function(){step(1);});
document.querySelectorAll(".bmtoggle button").forEach(function(b){b.addEventListener("click",function(){setBase(b.dataset.bm);});});
document.getElementById("fitMap").addEventListener("click",function(){if(CASES[active])fitCaseMap(CASES[active]);});
document.querySelectorAll(".ptab").forEach(function(t){t.addEventListener("click",function(){
  var pan=t.dataset.pan;
  document.querySelectorAll(".ptab").forEach(function(x){x.classList.toggle("active",x===t);});
  document.querySelectorAll(".ppane").forEach(function(p){p.classList.toggle("active",p.dataset.pane===pan);});});});
map.on("zoomend",function(){if(CASES[active])draw(CASES[active],false,false);});
initData();
</script>
